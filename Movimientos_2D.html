<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
    }

    h2 {
        margin-top: 40px;
    }

    /* ===== EJERCICIO 1: BARRAS ===== */
    #bar-container {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        height: 200px;
        margin: 20px auto;
        width: 300px;
        border: 2px solid #333;
        background: white;
    }

    .bar {
        width: 40px;
        margin: 0 5px;
        background: steelblue;
        transition: height 0.5s;
    }

    /* ===== CANVAS ===== */
    canvas {
        background: white;
        border: 2px solid #333;
        margin-top: 20px;
    }
</style>
</head>

<body>

<h1>Ejercicios de movimientos 2D Gráficos Dinámicos</h1>

<!-- ================= EJERCICIO 1 ================= -->
<h2>Ejercicio 1: Gráfico de Barras Dinámico</h2>
<div id="bar-container"></div>

<!-- ================= EJERCICIO 2 ================= -->
<h2>Ejercicio 2: Puntos en Movimiento</h2>
<canvas id="pointsCanvas" width="400" height="250"></canvas>

<!-- ================= EJERCICIO 3 ================= -->
<h2>Ejercicio 3: Curva Dinámica Coseno</h2>
<canvas id="cosCanvas" width="400" height="250"></canvas>

<script>
/* =====================================================
   EJERCICIO 1: GRÁFICO DE BARRAS DINÁMICO
===================================================== */

const barContainer = document.getElementById("bar-container");
let bars = [];

// Crear 5 barras
for (let i = 0; i < 5; i++) {
    let bar = document.createElement("div");
    bar.classList.add("bar");
    bar.style.height = "50px";
    barContainer.appendChild(bar);
    bars.push(bar);
}

// Función para actualizar valores
function updateBars() {
    bars.forEach(bar => {
        let value = Math.floor(Math.random() * 91) + 10; // 10 a 100
        bar.style.height = value * 2 + "px";
    });
}

// Actualizar cada segundo
setInterval(updateBars, 1000);


/* =====================================================
   EJERCICIO 2: PUNTOS EN MOVIMIENTO
===================================================== */

const canvasPoints = document.getElementById("pointsCanvas");
const ctxPoints = canvasPoints.getContext("2d");

// Crear puntos iniciales
let points = [];
for (let i = 0; i < 5; i++) {
    points.push({
        x: Math.random() * canvasPoints.width,
        y: Math.random() * canvasPoints.height
    });
}

function drawPoints() {
    ctxPoints.clearRect(0, 0, canvasPoints.width, canvasPoints.height);

    points.forEach(p => {
        ctxPoints.beginPath();
        ctxPoints.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctxPoints.fillStyle = "red";
        ctxPoints.fill();
    });
}

function updatePoints() {
    points.forEach(p => {
        p.x = Math.random() * canvasPoints.width;
        p.y = Math.random() * canvasPoints.height;
    });
    drawPoints();
}

// Inicializar
drawPoints();
setInterval(updatePoints, 1000);


/* =====================================================
   EJERCICIO 3: CURVA DINÁMICA COSENO
===================================================== */

const canvasCos = document.getElementById("cosCanvas");
const ctxCos = canvasCos.getContext("2d");

let offset = 0;

function drawCosine() {
    ctxCos.clearRect(0, 0, canvasCos.width, canvasCos.height);

    ctxCos.beginPath();

    for (let x = 0; x < canvasCos.width; x++) {
        let angle = (x + offset) * 0.05;
        let y = canvasCos.height / 2 + Math.cos(angle) * 50;

        if (x === 0) {
            ctxCos.moveTo(x, y);
        } else {
            ctxCos.lineTo(x, y);
        }
    }

    ctxCos.strokeStyle = "blue";
    ctxCos.lineWidth = 2;
    ctxCos.stroke();

    offset += 5; // movimiento
}

// Actualizar cada segundo
setInterval(drawCosine, 1000);

// Dibujar inicial
drawCosine();

</script>

</body>
</html>
